<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBus Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#0f1115] text-white min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-[420px] flex flex-col items-center">
        
        <div class="flex flex-col items-center text-center mb-8">
            <div class="w-16 h-16 bg-[#f7a01b] text-black rounded-[18px] flex items-center justify-center text-2xl mb-4 shadow-lg shadow-orange-500/10">
                <i class="fas fa-bus"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight">SmartBus</h1>
            <p class="text-[#8a8d91] text-sm uppercase tracking-widest mt-1">Admin Portal</p>
        </div>

        <div class="w-full bg-[#1c1e26] border border-[#2d3036] p-10 rounded-[24px] shadow-2xl">
            <div class="mb-8">
                <h2 class="text-xl font-bold mb-1 text-white">Welcome back</h2>
                <p class="text-[#8a8d91] text-sm">Sign in with your institutional account</p>
            </div>

            <form class="space-y-5">
                <div class="space-y-2">
                    <label class="text-[#8a8d91] text-xs font-semibold uppercase tracking-wider ml-1">Email Address</label>
                    <div class="relative flex items-center">
                        <i class="far fa-envelope absolute left-4 text-[#8a8d91]"></i>
                        <input type="email" placeholder="retaj@university.edu" 
                            class="w-full bg-[#262a33] border border-[#2d3036] py-3.5 pl-12 pr-4 rounded-xl text-white outline-none focus:border-[#f7a01b] focus:bg-[#f7a01b]/[0.02] transition-all text-sm">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[#8a8d91] text-xs font-semibold uppercase tracking-wider ml-1">Password</label>
                    <div class="relative flex items-center">
                        <i class="fas fa-lock absolute left-4 text-[#8a8d91]"></i>
                        <input type="password" placeholder="••••••••••••" 
                            class="w-full bg-[#262a33] border border-[#2d3036] py-3.5 pl-12 pr-12 rounded-xl text-white outline-none focus:border-[#f7a01b] focus:bg-[#f7a01b]/[0.02] transition-all text-sm">
                        <i class="far fa-eye absolute right-4 text-[#8a8d91] cursor-pointer hover:text-white transition-colors"></i>
                    </div>
                </div>

                <button type="submit" 
                    class="w-full bg-[#f7a01b] text-black font-bold py-4 rounded-xl mt-4 hover:opacity-90 active:scale-[0.98] transition-all shadow-lg shadow-orange-500/5">
                  <a href="Dashboard.html">Sign In</a>  
                </button>
            </form>

            <div class="mt-8 text-center text-sm">
                <p class="text-[#8a8d91]">
                    Forgot password? 
                    <a href="signupAdmin.html" class="text-[#f7a01b] font-semibold hover:underline decoration-2 underline-offset-4 ml-1">Sign up</a>
                </p>
            </div>
        </div>

        <footer class="mt-10 text-[#8a8d91] text-[10px] uppercase tracking-[2px] opacity-60">
            SmartBus Transportation System © 2026
        </footer>
    </div>

</body>
</html>
