<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBus | Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .signup-scroll::-webkit-scrollbar { width: 4px; }
        .signup-scroll::-webkit-scrollbar-track { background: #1c1e26; }
        .signup-scroll::-webkit-scrollbar-thumb { background: #f7a01b; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#0f1115] text-white min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-[440px] flex flex-col items-center">
        
        <div class="flex flex-col items-center text-center mb-6">
            <div class="w-14 h-14 bg-[#f7a01b] text-black rounded-[16px] flex items-center justify-center text-xl mb-3 shadow-lg shadow-orange-500/10">
                <i class="fas fa-bus"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight">SmartBus</h1>
            <p class="text-[#8a8d91] text-xs uppercase tracking-widest mt-1">Admin Portal</p>
        </div>

        <div class="w-full bg-[#1c1e26] border border-[#2d3036] p-8 md:p-10 rounded-[24px] shadow-2xl">
            <div class="mb-6 text-center md:text-left">
                <h2 class="text-xl font-bold mb-1">Create Account</h2>
                <p class="text-[#8a8d91] text-sm">Join our institutional transportation system</p>
            </div>

            <form class="signup-scroll max-h-[380px] overflow-y-auto pr-2 space-y-4">
                
                <div class="space-y-1.5">
                    <label class="text-[#8a8d91] text-xs font-semibold uppercase tracking-wider ml-1">Full Name</label>
                    <div class="relative flex items-center">
                        <input type="text" placeholder="Enter your full name" 
                            class="w-full bg-[#262a33] border border-[#2d3036] py-3 px-4 rounded-xl text-white outline-none focus:border-[#f7a01b] focus:bg-[#f7a01b]/[0.02] transition-all text-sm" required>
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="text-[#8a8d91] text-xs font-semibold uppercase tracking-wider ml-1">Institutional Email</label>
                    <div class="relative flex items-center">
                        <input type="email" placeholder="name@university.edu" 
                            class="w-full bg-[#262a33] border border-[#2d3036] py-3 px-4 rounded-xl text-white outline-none focus:border-[#f7a01b] focus:bg-[#f7a01b]/[0.02] transition-all text-sm" required>
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="text-[#8a8d91] text-xs font-semibold uppercase tracking-wider ml-1">Password</label>
                    <div class="relative flex items-center">
                        <input type="password" placeholder="Create a password" 
                            class="w-full bg-[#262a33] border border-[#2d3036] py-3 px-4 rounded-xl text-white outline-none focus:border-[#f7a01b] focus:bg-[#f7a01b]/[0.02] transition-all text-sm" required>
                    </div>
                </div>

                <div class="space-y-1.5 pb-2">
                    <label class="text-[#8a8d91] text-xs font-semibold uppercase tracking-wider ml-1">Confirm Password</label>
                    <div class="relative flex items-center">
                        <input type="password" placeholder="Repeat your password" 
                            class="w-full bg-[#262a33] border border-[#2d3036] py-3 px-4 rounded-xl text-white outline-none focus:border-[#f7a01b] focus:bg-[#f7a01b]/[0.02] transition-all text-sm" required>
                    </div>
                </div>

                <button type="submit" 
                    class="w-full bg-[#f7a01b] text-black font-bold py-4 rounded-xl sticky bottom-0 shadow-lg shadow-orange-500/10 hover:opacity-90 active:scale-[0.98] transition-all">
                    Create Account
                </button>
            </form>

            <div class="mt-6 text-center text-sm">
                <p class="text-[#8a8d91]">
                    Already have an account? 
                    <a href="signinAdmin.html" class="text-[#f7a01b] font-semibold hover:underline decoration-2 underline-offset-4 ml-1">Sign In</a>
                </p>
            </div>
        </div>

        <footer class="mt-8 text-[#8a8d91] text-[10px] uppercase tracking-[2px] opacity-60">
            SMARTBUS TRANSPORTATION SYSTEM © 2026
        </footer>
    </div>

</body>
</html>
